# fping alarms for OpenWrt router (child node)
# Evaluated on the parent (Woody), scoped to OpenWrt via the hosts directive.

# -------------------------------------------------------------------------
# Latency to 8.8.8.8

alarm: fping_latency_warning
     on: fping.8_8_8_8_latency
  hosts: OpenWrt
 lookup: average -10s unaligned
  units: ms
  every: 10s
   warn: $this > 25
   crit: $this > 45
   info: latency to 8.8.8.8 is high on router, possible ISP or bufferbloat issue

# -------------------------------------------------------------------------
# Packet loss to 8.8.8.8

alarm: fping_packet_loss_warning
     on: fping.8_8_8_8_packet_loss
  hosts: OpenWrt
 lookup: average -10s unaligned
  units: %
  every: 10s
   warn: $this > 5
   crit: $this > 20
   info: packet loss to 8.8.8.8 is elevated on router; connectivity may be degraded
