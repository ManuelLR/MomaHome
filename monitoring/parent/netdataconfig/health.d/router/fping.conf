# fping alarms for OpenWrt router (child node)
# Evaluated on the parent (Woody), scoped to OpenWrt via the hosts directive.
#
# NOTE: fping.plugin creates separate charts per host (fping.<ip>_latency),
# so cross-host correlation is not possible in the Netdata alarm DSL.
# To detect real ISP issues (vs. single-provider routing anomalies), monitor
# both 8.8.8.8 (Google) and 1.1.1.1 (Cloudflare): if both alarms fire
# simultaneously, it is almost certainly a local ISP or line problem.

# -------------------------------------------------------------------------
# Latency to 8.8.8.8

alarm: openwrt_fping_8888_latency
     on: fping.8_8_8_8_latency
  hosts: OpenWrt
 lookup: average -10s unaligned
  units: ms
  every: 10s
   warn: $this > 25
   crit: $this > 45
   info: router latency to 8.8.8.8 is high, possible ISP or bufferbloat issue

# -------------------------------------------------------------------------
# Packet loss to 8.8.8.8

alarm: openwrt_fping_8888_packet_loss
     on: fping.8_8_8_8_quality
  hosts: OpenWrt
 lookup: average -10s unaligned
  units: %
  every: 10s
   warn: $this > 5
   crit: $this > 20
   info: router packet loss to 8.8.8.8 detected, may affect video calls

# -------------------------------------------------------------------------
# Latency to 1.1.1.1

alarm: openwrt_fping_1111_latency
     on: fping.1_1_1_1_latency
  hosts: OpenWrt
 lookup: average -10s unaligned
  units: ms
  every: 10s
   warn: $this > 25
   crit: $this > 45
   info: router latency to 1.1.1.1 is high; if openwrt_fping_8888_latency also fires, likely an ISP issue

# -------------------------------------------------------------------------
# Packet loss to 1.1.1.1

alarm: openwrt_fping_1111_packet_loss
     on: fping.1_1_1_1_quality
  hosts: OpenWrt
 lookup: average -10s unaligned
  units: %
  every: 10s
   warn: $this > 5
   crit: $this > 20
   info: router packet loss to 1.1.1.1 detected; if openwrt_fping_8888_packet_loss also fires, likely an ISP issue
