# System resource alarms for OpenWrt router (child node)
# Evaluated on the parent (Woody), scoped to OpenWrt via the hosts directive.

# -------------------------------------------------------------------------
# CPU usage

alarm: openwrt_cpu_usage
     on: system.cpu
  hosts: OpenWrt
 lookup: average -10s unaligned of user,system,softirq,irq
  units: %
  every: 10s
   warn: $this > 70
   crit: $this > 90
   info: router CPU usage is high, may affect network performance

# -------------------------------------------------------------------------
# RAM usage (router has ~500MB available)

alarm: openwrt_ram_usage
     on: system.ram
  hosts: OpenWrt
 lookup: average -10s unaligned of used
  units: MiB
  every: 10s
   warn: $this > 400
   crit: $this > 450
   info: router RAM usage is high
