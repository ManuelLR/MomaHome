# HomeAssistant access to everything
user homeassistant-01
topic readwrite #

# Every user can readwrite in their own topics
pattern readwrite %u/#
pattern readwrite tasmota/discovery/#
pattern readwrite homeassistant/%u/#
pattern readwrite valetudo/discovery/#
pattern readwrite valetudo/%u/#

# homeassistant/sensor/roborocks5/roborocks5_sensor_MapSegments/config
pattern readwrite homeassistant/#

# Every user can report their connection state
pattern write $SYS/broker/connection/%c/state
