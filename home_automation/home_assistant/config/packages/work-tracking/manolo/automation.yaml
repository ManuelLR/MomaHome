# automation:
  # ─────────────────────────────────────────────────────────────────────
  # WRK-MAN-Signal ON
  # Fires when any work signal turns on and we are not already tracking.
  # Also called programmatically by WRK-MAN-End YES when the signal was
  # already ON at the time the previous session ended (e.g. user responds
  # to "Done?" Telegram while already back at the desk).
  # 1. Activates working boolean (recorder captures real T0).
  # 2. Creates a calendar event with placeholder end (+23h).
  # 3. Retrieves the new event's UID and stores it.
  # 4. Sends Telegram confirmation with UID as command argument.
  # Requires: calendar.manolo_work (Local Calendar integration via UI)
  # Requires: HA 2024.2+ for calendar.get_events with response_variable
  # ─────────────────────────────────────────────────────────────────────
  - alias: WRK-MAN-Signal ON
    id: wrk_man_signal_on
    mode: single
    initial_state: 'on'
    triggers:
      - platform: state
        entity_id: binary_sensor.manolo_work_signal
        to: 'on'
    conditions:
      - condition: state
        entity_id: input_boolean.manolo_working
        state: 'off'
    actions:
      - variables:
          start_str: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          end_placeholder_str: "{{ (now().timestamp() + 82800) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
          start_hm: "{{ now().strftime('%H:%M') }}"

      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.manolo_working

      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.manolo_work_session_start
        data:
          datetime: "{{ start_str }}"

      - action: calendar.create_event
        target:
          entity_id: calendar.manolo_work
        data:
          summary: "⏰ ¿Trabajando?"
          start_date_time: "{{ start_str }}"
          end_date_time: "{{ end_placeholder_str }}"
          description: "Pendiente de confirmar"

      - delay:
          seconds: 2

      # Get the newly created event to retrieve its UID
      - action: calendar.get_events
        target:
          entity_id: calendar.manolo_work
        data:
          start_date_time: "{{ start_str }}"
          end_date_time: "{{ (now().timestamp() + 30) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
        response_variable: new_events

      - variables:
          uid: >
            {% set events = new_events['calendar.manolo_work']['events'] | default([]) %}
            {% set pending = events | selectattr('summary', 'eq', '⏰ ¿Trabajando?') | list %}
            {{ pending[0]['uid'] if pending | length > 0 else '' }}

      - action: input_text.set_value
        target:
          entity_id: input_text.manolo_work_current_event_uid
        data:
          value: "{{ uid }}"

      - action: script.telegram_notify
        data:
          target_person: manolo
          title: "⏰ ¿Estás trabajando?"
          message: "Actividad detectada a las {{ start_hm }}"
          inline_keyboard:
            - "✅ Sí:/work_start_yes_manolo {{ uid }}"
            - "❌ No:/work_start_no_manolo {{ uid }}"


  # ─────────────────────────────────────────────────────────────────────
  # WRK-MAN-Start YES
  # User confirmed they are working.
  # Updates the calendar event summary to confirmed state.
  # ─────────────────────────────────────────────────────────────────────
  - alias: WRK-MAN-Start YES
    id: wrk_man_start_yes
    mode: single
    initial_state: 'on'
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data: &work_start_yes_manolo
          command: "/work_start_yes_manolo"
      - platform: event
        event_type: telegram_command
        event_data: *work_start_yes_manolo
    actions:
      - variables:
          uid: "{{ trigger.event.data.args[0] | default('') }}"
          day_label: >
            {{ '🏖️ Trabajo (especial)' if is_state('binary_sensor.workday_sensor', 'off') else '💼 Trabajo' }}

      - action: calendar.update_event
        target:
          entity_id: calendar.manolo_work
        data:
          uid: "{{ uid }}"
          summary: "{{ day_label }}"
          description: "Sesión confirmada"

      # Ensure UID is stored for the end-of-session Telegram
      - action: input_text.set_value
        target:
          entity_id: input_text.manolo_work_current_event_uid
        data:
          value: "{{ uid }}"

      # Answer Telegram callback if triggered via button
      - condition: template
        value_template: "{{ trigger.event.event_type == 'telegram_callback' }}"
      - action: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.event.data.id }}"
          message: "¡Sesión iniciada! ✓"


  # ─────────────────────────────────────────────────────────────────────
  # WRK-MAN-Start NO
  # User denied working. Remove the calendar event and reset state.
  # ─────────────────────────────────────────────────────────────────────
  - alias: WRK-MAN-Start NO
    id: wrk_man_start_no
    mode: single
    initial_state: 'on'
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data: &work_start_no_manolo
          command: "/work_start_no_manolo"
      - platform: event
        event_type: telegram_command
        event_data: *work_start_no_manolo
    actions:
      - variables:
          uid: "{{ trigger.event.data.args[0] | default('') }}"

      - action: calendar.delete_event
        target:
          entity_id: calendar.manolo_work
        data:
          uid: "{{ uid }}"

      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.manolo_working

      - action: input_text.set_value
        target:
          entity_id: input_text.manolo_work_current_event_uid
        data:
          value: ""

      # Answer Telegram callback if triggered via button
      - condition: template
        value_template: "{{ trigger.event.event_type == 'telegram_callback' }}"
      - action: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.event.data.id }}"
          message: "Sesión cancelada"


  # ─────────────────────────────────────────────────────────────────────
  # WRK-MAN-Signal OFF
  # Both signals have been off for 30 seconds and we are confirmed working.
  # Asks the user if they have finished working, passing the signal-off
  # timestamp as a command argument so the recorded end time is accurate
  # even if the user responds minutes or hours later.
  # Grace period: only fires if session has been active for > 2 minutes.
  # ─────────────────────────────────────────────────────────────────────
  - alias: WRK-MAN-Signal OFF
    id: wrk_man_signal_off
    mode: single
    initial_state: 'on'
    triggers:
      - platform: state
        entity_id: binary_sensor.manolo_work_signal
        to: 'off'
        for:
          seconds: 30
    conditions:
      - condition: state
        entity_id: input_boolean.manolo_working
        state: 'on'
      # Ignore if session started less than 2 minutes ago (signal bounce / not yet confirmed)
      - condition: template
        value_template: >
          {{ (now().timestamp() - as_timestamp(states('input_datetime.manolo_work_session_start'))) > 120 }}
    actions:
      - variables:
          uid: "{{ states('input_text.manolo_work_current_event_uid') }}"
          signal_off_ts: "{{ now().timestamp() | int }}"
          signal_off_hm: "{{ now().strftime('%H:%M') }}"

      - action: script.telegram_notify
        data:
          target_person: manolo
          title: "¿Has terminado de trabajar?"
          message: "Señal apagada a las {{ signal_off_hm }}. ¿Esa es tu hora de fin?"
          inline_keyboard:
            - "✅ Sí, terminé a las {{ signal_off_hm }}:/work_end_yes_manolo {{ uid }} {{ signal_off_ts }}"
            - "⏸ No, sigo trabajando:/work_end_no_manolo {{ uid }}"


  # ─────────────────────────────────────────────────────────────────────
  # WRK-MAN-End YES
  # User confirmed end of session.
  # Updates the calendar event with the actual end time (signal-off time,
  # not the time the user responded). Resets working state.
  # ─────────────────────────────────────────────────────────────────────
  - alias: WRK-MAN-End YES
    id: wrk_man_end_yes
    mode: single
    initial_state: 'on'
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data: &work_end_yes_manolo
          command: "/work_end_yes_manolo"
      - platform: event
        event_type: telegram_command
        event_data: *work_end_yes_manolo
    actions:
      - variables:
          uid: "{{ trigger.event.data.args[0] | default('') }}"
          end_ts: "{{ trigger.event.data.args[1] | default(now().timestamp() | int) | int }}"
          end_str: "{{ end_ts | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
          start_ts: "{{ as_timestamp(states('input_datetime.manolo_work_session_start')) }}"
          duration_h: "{{ ((end_ts - start_ts) / 3600) | round(2) }}"
          day_label: >
            {{ '🏖️ Trabajo (especial) ✓' if is_state('binary_sensor.workday_sensor', 'off') else '💼 Trabajo ✓' }}

      # Update calendar event with real end time
      - action: calendar.update_event
        target:
          entity_id: calendar.manolo_work
        data:
          uid: "{{ uid }}"
          end_date_time: "{{ end_str }}"
          summary: "{{ day_label }}"
          description: "{{ duration_h }}h"

      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.manolo_working

      - action: input_text.set_value
        target:
          entity_id: input_text.manolo_work_current_event_uid
        data:
          value: ""

      # Edge case: signal was already ON before the user responded to this Telegram.
      # Since the state-change trigger already fired (and was rejected because working=on),
      # we manually re-trigger the session detection now that working=off.
      - if:
          - condition: state
            entity_id: binary_sensor.manolo_work_signal
            state: 'on'
        then:
          - action: automation.trigger
            target:
              entity_id: automation.wrk_man_signal_on
            data:
              skip_condition: false

      # Answer Telegram callback if triggered via button
      - condition: template
        value_template: "{{ trigger.event.event_type == 'telegram_callback' }}"
      - action: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.event.data.id }}"
          message: "✓ {{ duration_h }}h guardadas"


  # ─────────────────────────────────────────────────────────────────────
  # WRK-MAN-End NO
  # User says they are still working despite the signal being off.
  # ─────────────────────────────────────────────────────────────────────
  - alias: WRK-MAN-End NO
    id: wrk_man_end_no
    mode: single
    initial_state: 'on'
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data: &work_end_no_manolo
          command: "/work_end_no_manolo"
      - platform: event
        event_type: telegram_command
        event_data: *work_end_no_manolo
    actions:
      - condition: template
        value_template: "{{ trigger.event.event_type == 'telegram_callback' }}"
      - action: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.event.data.id }}"
          message: "OK, sigues trabajando ⏸"


  # ─────────────────────────────────────────────────────────────────────
  # WRK-MAN-Calendar sync
  # Runs every 5 minutes. Queries today's closed calendar events
  # (those with ✓ in summary) and updates input_number.manolo_work_hours_today.
  # Because it queries the calendar directly, any manual edit to an event
  # is reflected within 5 minutes.
  # ─────────────────────────────────────────────────────────────────────
  - alias: WRK-MAN-Calendar sync
    id: wrk_man_calendar_sync
    mode: single
    initial_state: 'on'
    triggers:
      - platform: time_pattern
        minutes: "/5"
    actions:
      - action: calendar.get_events
        target:
          entity_id: calendar.manolo_work
        data:
          start_date_time: "{{ today_at('00:00').strftime('%Y-%m-%d %H:%M:%S') }}"
          end_date_time: "{{ today_at('23:59:59').strftime('%Y-%m-%d %H:%M:%S') }}"
        response_variable: today_events

      - variables:
          uid_active: "{{ states('input_text.manolo_work_current_event_uid') }}"
          total_h: >
            {% set ns = namespace(total=0.0) %}
            {% for e in today_events['calendar.manolo_work']['events'] | default([]) %}
              {% if e.uid | default('') != uid_active
                 and e.end is defined
                 and '✓' in (e.summary | default('')) %}
                {% set ns.total = ns.total + (as_timestamp(e.end) - as_timestamp(e.start)) / 3600 %}
              {% endif %}
            {% endfor %}
            {{ ns.total | round(2) }}

      - action: input_number.set_value
        target:
          entity_id: input_number.manolo_work_hours_today
        data:
          value: "{{ total_h }}"


  # ─────────────────────────────────────────────────────────────────────
  # WRK-MAN-Update yesterday
  # Runs once at 00:05 to calculate and store yesterday's total hours.
  # ─────────────────────────────────────────────────────────────────────
  - alias: WRK-MAN-Update yesterday
    id: wrk_man_update_yesterday
    mode: single
    initial_state: 'on'
    triggers:
      - platform: time
        at: "00:05:00"
    actions:
      - variables:
          yesterday_start: "{{ (now().timestamp() - 86400) | timestamp_custom('%Y-%m-%d 00:00:00', true) }}"
          yesterday_end: "{{ (now().timestamp() - 86400) | timestamp_custom('%Y-%m-%d 23:59:59', true) }}"

      - action: calendar.get_events
        target:
          entity_id: calendar.manolo_work
        data:
          start_date_time: "{{ yesterday_start }}"
          end_date_time: "{{ yesterday_end }}"
        response_variable: yesterday_events

      - variables:
          total_h: >
            {% set ns = namespace(total=0.0) %}
            {% for e in yesterday_events['calendar.manolo_work']['events'] | default([]) %}
              {% if e.end is defined and '✓' in (e.summary | default('')) %}
                {% set ns.total = ns.total + (as_timestamp(e.end) - as_timestamp(e.start)) / 3600 %}
              {% endif %}
            {% endfor %}
            {{ ns.total | round(2) }}

      - action: input_number.set_value
        target:
          entity_id: input_number.manolo_work_hours_yesterday
        data:
          value: "{{ total_h }}"


  # ─────────────────────────────────────────────────────────────────────
  # WRK-MAN-Split midnight
  # If a work session is active at midnight, splits it:
  # - Closes the current event at midnight (for the ending day).
  # - Creates a new placeholder event starting at midnight (for the new day).
  # - Updates session_start and the stored UID.
  # ─────────────────────────────────────────────────────────────────────
  - alias: WRK-MAN-Split midnight
    id: wrk_man_split_midnight
    mode: single
    initial_state: 'on'
    triggers:
      - platform: time
        at: "00:00:00"
    conditions:
      - condition: state
        entity_id: input_boolean.manolo_working
        state: 'on'
    actions:
      - variables:
          uid: "{{ states('input_text.manolo_work_current_event_uid') }}"
          midnight_str: "{{ now().strftime('%Y-%m-%d 00:00:00') }}"
          new_end_str: "{{ (now().timestamp() + 82800) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"

      # Close the event from the ending day at midnight
      - action: calendar.update_event
        target:
          entity_id: calendar.manolo_work
        data:
          uid: "{{ uid }}"
          end_date_time: "{{ midnight_str }}"
          summary: "💼 Trabajo ✓"
          description: "Cerrado automáticamente a medianoche"

      # Create a new event for the new day (confirmed, in progress)
      - action: calendar.create_event
        target:
          entity_id: calendar.manolo_work
        data:
          summary: "💼 Trabajo"
          start_date_time: "{{ midnight_str }}"
          end_date_time: "{{ new_end_str }}"
          description: "Continuación de sesión anterior"

      - delay:
          seconds: 2

      # Get the UID of the new event
      - action: calendar.get_events
        target:
          entity_id: calendar.manolo_work
        data:
          start_date_time: "{{ midnight_str }}"
          end_date_time: "{{ (now().timestamp() + 30) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
        response_variable: midnight_events

      - variables:
          new_uid: >
            {% set events = midnight_events['calendar.manolo_work']['events'] | default([]) %}
            {% set new_ev = events | selectattr('summary', 'eq', '💼 Trabajo') | list %}
            {{ new_ev[0]['uid'] if new_ev | length > 0 else '' }}

      - action: input_text.set_value
        target:
          entity_id: input_text.manolo_work_current_event_uid
        data:
          value: "{{ new_uid }}"

      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.manolo_work_session_start
        data:
          datetime: "{{ midnight_str }}"
