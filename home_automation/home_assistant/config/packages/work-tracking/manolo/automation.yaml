# automation:

  # ─────────────────────────────────────────────────────────────────────
  # AUT-Work Manolo - Signal ON
  # Fires when any individual work signal turns ON.
  #
  # Invariant: events never overlap. Before creating the new ⏰ event,
  # any currently active event is closed at the exact start time of the
  # new one. Querying "right now" always yields at most one event.
  #
  # Day type is encoded in the ⏰ summary at creation time:
  #   "⏰ Working?"          → signal fired on a workday
  #   "⏰ Working? (special)" → signal fired on a weekend/holiday
  # This ensures Start YES uses the correct label even if the user
  # responds the next day (when workday_sensor reflects a different day).
  #
  # Requires: calendar.manolo_work (Local Calendar — create via HA UI)
  # Requires: HA 2024.2+ for calendar.get_events with response_variable
  # ─────────────────────────────────────────────────────────────────────
  - alias: "AUT-Work Manolo - Signal ON"
    id: aut_work_manolo_signal_on
    mode: queued
    initial_state: 'on'
    triggers:
      - platform: state
        entity_id: switch.man_001
        to: 'on'
      - platform: state
        entity_id: binary_sensor.s23_work_profile
        to: 'on'
    actions:
      - variables:
          # Capture the exact moment the signal fired — used as both the
          # close-time for any existing event and the start of the new one.
          start_str: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          end_placeholder_str: "{{ (now().timestamp() + 82800) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
          start_hm: "{{ now().strftime('%H:%M') }}"
          one_sec_later: "{{ (now().timestamp() + 1) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
          # Encode the day type in the pending summary at creation time
          pending_summary: >
            {{ '⏰ Working? (special)' if is_state('binary_sensor.workday_sensor', 'off') else '⏰ Working?' }}

      # Find any currently active event (invariant: at most one in this window)
      - action: calendar.get_events
        target:
          entity_id: calendar.manolo_work
        data:
          start_date_time: "{{ start_str }}"
          end_date_time: "{{ one_sec_later }}"
        response_variable: current_events

      - variables:
          # By invariant the result has 0 or 1 events — no need to loop/filter
          existing_uid: >
            {% set events = current_events['calendar.manolo_work']['events'] | default([]) %}
            {{ events[0].uid if events | length > 0 else '' }}

      # Close the existing event at exactly start_str (no gap, no overlap)
      - if:
          - condition: template
            value_template: "{{ existing_uid != '' }}"
        then:
          - action: calendar.update_event
            target:
              entity_id: calendar.manolo_work
            data:
              uid: "{{ existing_uid }}"
              end_date_time: "{{ start_str }}"

      # Create the new pending event with the correct day-type summary
      - action: calendar.create_event
        target:
          entity_id: calendar.manolo_work
        data:
          summary: "{{ pending_summary }}"
          start_date_time: "{{ start_str }}"
          end_date_time: "{{ end_placeholder_str }}"
          description: "Pending confirmation"

      - delay:
          seconds: 2

      # Retrieve the UID of the newly created event to embed in Telegram buttons
      - action: calendar.get_events
        target:
          entity_id: calendar.manolo_work
        data:
          start_date_time: "{{ start_str }}"
          end_date_time: "{{ (now().timestamp() + 30) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
        response_variable: new_events

      - variables:
          new_uid: >
            {% set events = new_events['calendar.manolo_work']['events'] | default([]) %}
            {% set ns = namespace(uid='') %}
            {% for e in events %}
              {% if '⏰' in (e.summary | default('')) and ns.uid == '' %}
                {% set ns.uid = e.uid | default('') %}
              {% endif %}
            {% endfor %}
            {{ ns.uid }}

      - action: script.telegram_notify
        data:
          target_person: manolo
          title: "⏰ Are you working?"
          message: "Activity detected at {{ start_hm }}"
          inline_keyboard:
            - "✅ Yes:/work_start_yes_manolo {{ new_uid }}"
            - "❌ No:/work_start_no_manolo {{ new_uid }}"


  # ─────────────────────────────────────────────────────────────────────
  # AUT-Work Manolo - Start YES
  # User confirmed they are working.
  # Reads the ⏰ event's summary to determine the correct confirmed label
  # (💼 Working or 🏖️ Working (special)), regardless of when the user
  # responds — even if it's the next day.
  # ─────────────────────────────────────────────────────────────────────
  - alias: "AUT-Work Manolo - Start YES"
    id: aut_work_manolo_start_yes
    mode: queued
    initial_state: 'on'
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data: &work_start_yes_manolo
          command: "/work_start_yes_manolo"
      - platform: event
        event_type: telegram_command
        event_data: *work_start_yes_manolo
    actions:
      - variables:
          uid: "{{ trigger.event.data.args[0] | default('') }}"
          # Search window: 3 days back + 1 day forward covers any realistic response delay
          search_start: "{{ (now().timestamp() - 259200) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
          search_end:   "{{ (now().timestamp() + 86400) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"

      # Read the event by UID to get its original pending summary
      - action: calendar.get_events
        target:
          entity_id: calendar.manolo_work
        data:
          start_date_time: "{{ search_start }}"
          end_date_time: "{{ search_end }}"
        response_variable: search_events

      - variables:
          pending_summary: >
            {% set events = search_events['calendar.manolo_work']['events'] | default([]) %}
            {% set ns = namespace(s='') %}
            {% for e in events %}
              {% if e.uid | default('') == uid and ns.s == '' %}
                {% set ns.s = e.summary | default('') %}
              {% endif %}
            {% endfor %}
            {{ ns.s }}
          # Derive confirmed label from what was captured at signal time — correct for any day
          confirmed_summary: >
            {{ '🏖️ Working (special)' if '(special)' in pending_summary else '💼 Working' }}

      - action: calendar.update_event
        target:
          entity_id: calendar.manolo_work
        data:
          uid: "{{ uid }}"
          summary: "{{ confirmed_summary }}"
          description: "Confirmed session"

      - condition: template
        value_template: "{{ trigger.event.event_type == 'telegram_callback' }}"
      - action: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.event.data.id }}"
          message: "Session started ✓"


  # ─────────────────────────────────────────────────────────────────────
  # AUT-Work Manolo - Start NO
  # User denied working. Delete the ⏰ event.
  # ─────────────────────────────────────────────────────────────────────
  - alias: "AUT-Work Manolo - Start NO"
    id: aut_work_manolo_start_no
    mode: queued
    initial_state: 'on'
    triggers:
      - platform: event
        event_type: telegram_callback
        event_data: &work_start_no_manolo
          command: "/work_start_no_manolo"
      - platform: event
        event_type: telegram_command
        event_data: *work_start_no_manolo
    actions:
      - variables:
          uid: "{{ trigger.event.data.args[0] | default('') }}"

      - action: calendar.delete_event
        target:
          entity_id: calendar.manolo_work
        data:
          uid: "{{ uid }}"

      - condition: template
        value_template: "{{ trigger.event.event_type == 'telegram_callback' }}"
      - action: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.event.data.id }}"
          message: "Session cancelled"


  # ─────────────────────────────────────────────────────────────────────
  # AUT-Work Manolo - Signal OFF
  # Fires when any individual work signal turns OFF (30s debounce).
  # Closes the currently active event (⏰ or 💼) with the signal-off
  # timestamp:
  #   - Confirmed events (💼/🏖️) → append " ✓"
  #   - Pending events (⏰)       → close with timestamp, keep summary for review
  # If another signal is still ON, triggers Signal ON to create a new ⏰.
  # ─────────────────────────────────────────────────────────────────────
  - alias: "AUT-Work Manolo - Signal OFF"
    id: aut_work_manolo_signal_off
    mode: queued
    initial_state: 'on'
    triggers:
      - platform: state
        entity_id: switch.man_001
        to: 'off'
        for:
          seconds: 30
      - platform: state
        entity_id: binary_sensor.s23_work_profile
        to: 'off'
        for:
          seconds: 30
    actions:
      - variables:
          signal_off_str: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          one_sec_before: "{{ (now().timestamp() - 1) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"

      # Find the event active just before the signal turned off
      # (invariant: at most one event in this window)
      - action: calendar.get_events
        target:
          entity_id: calendar.manolo_work
        data:
          start_date_time: "{{ one_sec_before }}"
          end_date_time: "{{ signal_off_str }}"
        response_variable: active_events

      - variables:
          # By invariant the result has 0 or 1 events — direct access
          active_uid: >
            {% set events = active_events['calendar.manolo_work']['events'] | default([]) %}
            {{ events[0].uid if events | length > 0 else '' }}
          active_summary: >
            {% set events = active_events['calendar.manolo_work']['events'] | default([]) %}
            {{ events[0].summary if events | length > 0 else '' }}
          # Confirmed events get ✓; pending ⏰ events keep their summary for review
          new_summary: >
            {% set s = active_summary %}
            {{ s + ' ✓' if ('💼' in s or '🏖️' in s) else s }}
          other_signal_on: >
            {% if trigger.entity_id == 'switch.man_001' %}
              {{ is_state('binary_sensor.s23_work_profile', 'on') }}
            {% else %}
              {{ is_state('switch.man_001', 'on') }}
            {% endif %}

      # Close the active event with the signal-off timestamp
      - if:
          - condition: template
            value_template: "{{ active_uid != '' }}"
        then:
          - action: calendar.update_event
            target:
              entity_id: calendar.manolo_work
            data:
              uid: "{{ active_uid }}"
              end_date_time: "{{ signal_off_str }}"
              summary: "{{ new_summary }}"

      # If another signal is still on, start a new session detection
      - if:
          - condition: template
            value_template: "{{ other_signal_on == 'True' or other_signal_on == True }}"
        then:
          - action: automation.trigger
            target:
              entity_id: automation.aut_work_manolo_signal_on
            data:
              skip_condition: false


  # ─────────────────────────────────────────────────────────────────────
  # AUT-Work Manolo - Split midnight
  # If a confirmed session is active at midnight, splits it:
  # - Closes the current event at midnight (adds ✓)
  # - Opens a new event for the new day using the NEW day's type
  #   (workday_sensor reflects the new day at 00:00:00)
  # ─────────────────────────────────────────────────────────────────────
  - alias: "AUT-Work Manolo - Split midnight"
    id: aut_work_manolo_split_midnight
    mode: single
    initial_state: 'on'
    triggers:
      - platform: time
        at: "00:00:00"
    actions:
      - variables:
          midnight_str: "{{ now().strftime('%Y-%m-%d 00:00:00') }}"
          new_end_str: "{{ (now().timestamp() + 82800) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
          one_sec_later: "{{ (now().timestamp() + 1) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"
          # Day type for the new event (reflects the NEW day at 00:00:00)
          new_day_label: >
            {{ '🏖️ Working (special)' if is_state('binary_sensor.workday_sensor', 'off') else '💼 Working' }}

      - action: calendar.get_events
        target:
          entity_id: calendar.manolo_work
        data:
          start_date_time: "{{ midnight_str }}"
          end_date_time: "{{ one_sec_later }}"
        response_variable: midnight_events

      - variables:
          # By invariant at most one event in this window
          midnight_uid: >
            {% set events = midnight_events['calendar.manolo_work']['events'] | default([]) %}
            {{ events[0].uid if events | length > 0 else '' }}
          midnight_summary: >
            {% set events = midnight_events['calendar.manolo_work']['events'] | default([]) %}
            {{ events[0].summary if events | length > 0 else '' }}

      - if:
          - condition: template
            # Only split if there is a confirmed session (💼 or 🏖️, no ✓ yet)
            value_template: >
              {{ midnight_uid != '' and ('💼' in midnight_summary or '🏖️' in midnight_summary) }}
        then:
          # Close the ending-day event at midnight
          - action: calendar.update_event
            target:
              entity_id: calendar.manolo_work
            data:
              uid: "{{ midnight_uid }}"
              end_date_time: "{{ midnight_str }}"
              summary: "{{ midnight_summary + ' ✓' }}"

          # Open a new event for the new day with the correct day type
          - action: calendar.create_event
            target:
              entity_id: calendar.manolo_work
            data:
              summary: "{{ new_day_label }}"
              start_date_time: "{{ midnight_str }}"
              end_date_time: "{{ new_end_str }}"
              description: "Continuation of previous session"


  # ─────────────────────────────────────────────────────────────────────
  # AUT-Work Manolo - Compact yesterday
  # Runs at 00:30 to process yesterday's full set of events.
  # Merges consecutive confirmed (✓) sessions where the gap is ≤ 2 min.
  # Each repeat pass merges one pair; up to 10 passes handles any
  # realistic number of daily sessions.
  # The three values (curr_uid, next_uid, new_end) are computed in a
  # single template pass and extracted with split('|||').
  # ─────────────────────────────────────────────────────────────────────
  - alias: "AUT-Work Manolo - Compact yesterday"
    id: aut_work_manolo_compact_yesterday
    mode: single
    initial_state: 'on'
    triggers:
      - platform: time
        at: "00:30:00"
    actions:
      - variables:
          yesterday_start: "{{ (today_at('00:00') | as_timestamp - 86400) | timestamp_custom('%Y-%m-%d 00:00:00', true) }}"
          yesterday_end: "{{ (today_at('00:00') | as_timestamp - 1) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}"

      - repeat:
          count: 10
          sequence:
            - action: calendar.get_events
              target:
                entity_id: calendar.manolo_work
              data:
                start_date_time: "{{ yesterday_start }}"
                end_date_time: "{{ yesterday_end }}"
              response_variable: compact_events

            - variables:
                # Single pass: find first mergeable pair and encode result as |||‑separated string.
                # curr_uid|||next_uid|||new_end  — empty string means "no pair found".
                compact_result: >
                  {% set events = compact_events['calendar.manolo_work']['events'] | default([]) %}
                  {% set confirmed = [] %}
                  {% for e in events %}
                    {% if '✓' in (e.summary | default('')) %}
                      {% set confirmed = confirmed + [e] %}
                    {% endif %}
                  {% endfor %}
                  {% set sorted_ev = confirmed | sort(attribute='start') %}
                  {% set ns = namespace(curr_uid='', next_uid='', new_end='') %}
                  {% for i in range(sorted_ev | length - 1) %}
                    {% if ns.curr_uid == '' %}
                      {% set curr = sorted_ev[i] %}
                      {% set nxt  = sorted_ev[i+1] %}
                      {% if (as_timestamp(nxt.start) - as_timestamp(curr.end)) <= 120 %}
                        {% set ns.curr_uid = curr.uid | default('') %}
                        {% set ns.next_uid = nxt.uid  | default('') %}
                        {% set ns.new_end  = nxt.end %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.curr_uid }}|||{{ ns.next_uid }}|||{{ ns.new_end }}
                compact_curr_uid: "{{ compact_result.split('|||')[0] }}"
                compact_next_uid: "{{ compact_result.split('|||')[1] }}"
                compact_new_end:  "{{ compact_result.split('|||')[2] }}"

            - if:
                - condition: template
                  value_template: "{{ compact_curr_uid != '' }}"
              then:
                # Extend the first event to cover the second
                - action: calendar.update_event
                  target:
                    entity_id: calendar.manolo_work
                  data:
                    uid: "{{ compact_curr_uid }}"
                    end_date_time: "{{ compact_new_end }}"
                # Remove the second event (now absorbed)
                - action: calendar.delete_event
                  target:
                    entity_id: calendar.manolo_work
                  data:
                    uid: "{{ compact_next_uid }}"
