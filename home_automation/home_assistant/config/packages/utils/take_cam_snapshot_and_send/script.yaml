# script:
  ## To make it works, you must add the folder to `allowlist_external_dirs` in `homeassistant:` config section
  take_camera_snapshot_and_send_telegram:
    description: "Take an snapshot of a camera entity and send to telegram"
    mode: parallel
    fields:
      camera_entity:
        required: true
        selector:
          entity:
            domain: camera
      target_person:
        required: true
        default: 'auto'
        selector:
          select:
            options:
              - label: "Auto (in home or all)"
                value: "auto"
              - label: "Manolo"
                value: "manolo"
              - label: "Monica"
                value: "monica"
      message:
        required: false
        selector:
          text:
      disable_notification:
        required: false
        default: false
        selector:
          boolean:
    variables:
      tmp_path_to_use: "/tmp/homeassistant/snapshots/"
    sequence:
      - alias: "Set variables"
        variables:
          file_path: '{{ tmp_path_to_use }}/{{ camera_entity }}_{{ now().strftime("%Y%m%d-%H%M%S%f") }}.png'
      - service: camera.snapshot
        target:
          entity_id: "{{ camera_entity }}"
        data:
          filename: '{{ file_path }}'
      - service: script.telegram_notify
        data:
          target_person: '{{ target_person | default("auto") }}'
          content_type: 'send_photo'
          photo_file: '{{ file_path }}'
          media_caption: '{{ message }}'
          disable_notification: '{{ disable_notification | default(false) }}'
      - delay:
          seconds: 15
      - service: delete.file
          # This is a custom integration !
        data:
          file: '{{ file_path }}'
