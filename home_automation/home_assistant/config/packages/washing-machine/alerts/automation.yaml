# automation:
  - alias: AUT-Notify Washing machine finished
    triggers:
      - platform: state
        entity_id: sensor.washing_machine_status
        to: Clean
        not_from:
          - 'unknown'
          - 'unavailable'
      - platform: state
        entity_id:
          - sensor.home_occupancy_status
        to: 'Home'
        not_from:
          - 'unknown'
          - 'unavailable'
        for:
          minutes: 2
    conditions:
      condition: and
      conditions:
        - condition: state
          entity_id: sensor.washing_machine_status
          state: Clean
    actions:
      - service: script.telegram_notify
        data:
          title: 'Washing Machine finished'
          message: 'Hey, the washing machine has finished and is ready to be emptied'
          inline_keyboard:
            - 'Already empty:/washing_machine_already_empty'
