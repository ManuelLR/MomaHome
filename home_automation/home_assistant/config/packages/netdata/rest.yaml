# rest:
  ##
  # Netdata Integration
  # https://learn.netdata.cloud/docs/netdata-agent/api
  #
  # Metrics are obtained from the local Netdata parent instance (localhost:19999).
  # Router metrics come from the Netdata child agent that streams data to the parent.
  #
  # Router child URL pattern: http://localhost:19999/host/<ROUTER_HOSTNAME>/api/v1/...
  # NOTE: Replace "OpenWrt" below with your router's actual hostname in Netdata
  #       if it differs. You can check available hosts at:
  #       http://localhost:19999/api/v1/info  (look for "mirrored_hosts")
  ##

  ### ==================== ###
  ###    Server Metrics     ###
  ### ==================== ###

  - resource: "http://localhost:19999/api/v1/data?chart=system.cpu&dimensions=idle&after=-1&points=1&format=json&options=percentage"
    scan_interval: 30
    sensor:
      - name: "Server CPU Usage"
        value_template: "{{ (100 - value_json.data[0][1]) | round(1) }}"
        unit_of_measurement: "%"
        state_class: measurement

  - resource: "http://localhost:19999/api/v1/data?chart=system.ram&dimensions=used&after=-1&points=1&format=json"
    scan_interval: 60
    sensor:
      - name: "Server RAM Used"
        value_template: "{{ value_json.data[0][1] | round(0) }}"
        unit_of_measurement: "MiB"
        state_class: measurement

  - resource: "http://localhost:19999/api/v1/data?chart=system.load&dimensions=load1&after=-1&points=1&format=json"
    scan_interval: 60
    sensor:
      - name: "Server Load 1min"
        value_template: "{{ value_json.data[0][1] | round(2) }}"
        state_class: measurement

  - resource: "http://localhost:19999/api/v1/data?chart=disk_space._&dimensions=used&after=-1&points=1&format=json"
    scan_interval: 300
    sensor:
      - name: "Server Disk Used"
        value_template: "{{ (value_json.data[0][1] / 1024) | round(1) }}"
        unit_of_measurement: "GiB"
        state_class: measurement

  - resource: "http://localhost:19999/api/v1/data?chart=disk_space._&dimensions=avail&after=-1&points=1&format=json"
    scan_interval: 300
    sensor:
      - name: "Server Disk Available"
        value_template: "{{ (value_json.data[0][1] / 1024) | round(1) }}"
        unit_of_measurement: "GiB"
        state_class: measurement

  ### ==================== ###
  ###    Router Metrics     ###
  ### ==================== ###

  - resource: "http://localhost:19999/host/OpenWrt/api/v1/data?chart=system.cpu&dimensions=idle&after=-1&points=1&format=json&options=percentage"
    scan_interval: 30
    sensor:
      - name: "Router CPU Usage"
        value_template: "{{ (100 - value_json.data[0][1]) | round(1) }}"
        unit_of_measurement: "%"
        state_class: measurement

  - resource: "http://localhost:19999/host/OpenWrt/api/v1/data?chart=system.ram&dimensions=used&after=-1&points=1&format=json"
    scan_interval: 60
    sensor:
      - name: "Router RAM Used"
        value_template: "{{ value_json.data[0][1] | round(0) }}"
        unit_of_measurement: "MiB"
        state_class: measurement

  - resource: "http://localhost:19999/host/OpenWrt/api/v1/data?chart=system.load&dimensions=load1&after=-1&points=1&format=json"
    scan_interval: 60
    sensor:
      - name: "Router Load 1min"
        value_template: "{{ value_json.data[0][1] | round(2) }}"
        state_class: measurement

  - resource: "http://localhost:19999/host/OpenWrt/api/v1/data?chart=system.uptime&dimensions=uptime&after=-1&points=1&format=json"
    scan_interval: 300
    sensor:
      - name: "Router Uptime"
        value_template: "{{ (value_json.data[0][1] / 86400) | round(1) }}"
        unit_of_measurement: "days"
        state_class: measurement
