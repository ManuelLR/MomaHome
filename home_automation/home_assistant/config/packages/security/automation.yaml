# automation:
  - alias: AUT-New device found
    id: AUT-New_Device_Found
    initial_state: 'on'
    mode: parallel
    triggers:
      - platform: event
        event_type: device_tracker_new_device
    actions:
      - service: script.telegram_notify
        data: &data-alert-new-device
          title: 'ALERT: New device found !'
          message: 'New device called `{{ trigger.event.data.host_name }}` with MAC `{{ trigger.event.data.mac }}` found'
      - service: script.telegram_notify
        data:
          target_person: manolo
          <<: *data-alert-new-device

  - alias: AUT-Notify failed login attempt
    id: AUT-Notify_Failed_Login_Attempt
    initial_state: 'on'
    mode: parallel
    triggers:
      - trigger: persistent_notification
        update_type:
          - added
    conditions:
      - condition: template
        value_template: "{{ 'Login attempt' in trigger.notification.title }}"
    actions:
      service: script.telegram_notify
      data:
        target_person: manolo
        title: "*{{ trigger.notification.title }} !*"
        message: "{{ trigger.notification.message }}"

  - alias: AUT-Notify ip_banned
    id: AUT-Notify_IP_Banned
    initial_state: 'on'
    mode: parallel
    triggers:
      - trigger: persistent_notification
        update_type:
          - added
    conditions:
      - condition: template
        value_template: "{{ 'Banning IP' in trigger.notification.title }}"
    actions:
      - alias: "Set variables"
        variables:
            # Extracted from a message like: Too many login attemps from xxx.xxx.xxx.xxx
          banned_ip: "{{ trigger.notification.message.split(' ') | last }}"
      - service: script.telegram_notify
        data:
          title: "*{{ trigger.notification.title }} !*"
          message: "{{ trigger.notification.message }}"
          inline_keyboard:
            - 'Unban {{ banned_ip }} and restart Home Assistant:/unban_ip {{ banned_ip }}'

  - alias: AUT-Unban IP
    id: AUT-Unban_IP
    mode: restart
    initial_state: 'on'
    triggers:
      - platform: event
        id: event_telegram_command
        event_type: telegram_command
        event_data: &telegram_unban_ip_device
          command: "/unban_ip"
        variables:
          ip_to_unban: "{{ trigger.event.data['args'][0] }}"
      - platform: event
        id: event_telegram_callback
        event_type: telegram_callback
        event_data: *telegram_unban_ip_device
        variables:
          ip_to_unban: "{{ trigger.event.data['data'].split(' ')[1] }}"
    actions:
      - service: shell_command.unban_ip
        data:
          ip_to_unban: "{{ ip_to_unban }}"
      - if: "{{ trigger.id == 'event_telegram_callback' }}"
        then:
          - service: telegram_bot.answer_callback_query
            data:
              callback_query_id: "{{ trigger.event.data.id }}"
              message: "Unbanned and restarting HomeAssistant"
      - service: homeassistant.restart

  - alias: AUT-Notify Entrance Door Opened
    id: AUT-Notify_Entrance_Door_Opened
    initial_state: 'on'
    triggers:
      - platform: state
        entity_id: binary_sensor.entrance_door_sensor_opened
        to: 'on'
    actions:
      - service: script.telegram_notify
        data:
          target_person: manolo
          title: '[Debug] *Door Opened*'
          message: 'The entrance door has been opened.'
          disable_notification: true

  - alias: AUT-Notify Entrance Door Opened Extended Away
    id: AUT-Notify_Entrance_Door_Opened_Extended_Away
    initial_state: 'on'
    triggers:
      - platform: state
        entity_id: binary_sensor.entrance_door_sensor_opened
        to: 'on'
    conditions:
      - condition: state
        entity_id: sensor.home_occupancy_status
        state:
          - 'Extended Away'
          # Some times after 'Extended Away', we have race condition so temporarily we should add that state
          - 'Just Arrived'
    actions:
      - service: script.telegram_notify
        data:
          title: 'Alert: Door Opened'
          message: 'The entrance door has been opened while the house is in Extended Away mode.'

  - alias: AUT-Notify Entrance Door Opened Too much time
    id: AUT-Notify_Entrance_Door_Opened_Too_Much_Time
    initial_state: 'on'
    triggers:
      - platform: state
        entity_id: binary_sensor.entrance_door_sensor_opened
        to: 'on'
        for: '00:03:00'
    actions:
      - service: script.telegram_notify
        data:
          title: 'Alert: Door Left Open'
          message: 'The entrance door has been left open for more than 3 minutes.'

  - alias: AUT-Notify Centinel Mode on Extended Away
    id: AUT-Notify_Centinel_Mode_On_Extended_Away
    initial_state: 'on'
    triggers:
      - platform: state
        entity_id: sensor.home_occupancy_status
        to: 'Extended Away'
        not_from:
          - 'unknown'
          - 'unavailable'
    actions:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.centinel_mode
      - service: script.telegram_notify
        data:
          title: 'Centinel Mode'
          message: 'Centinel Mode has been enabled automatically due to Extended Away status.'
          inline_keyboard:
            - 'Disable Centinel Mode:/disable_centinel_mode'

  - alias: AUT-Disable Centinel Mode
    id: AUT-Disable_Centinel_Mode
    mode: restart
    initial_state: 'on'
    triggers:
      - platform: event
        event_type: telegram_command
        event_data: &telegram_disable_centinel_mode
          command: "/disable_centinel_mode"
      - platform: event
        event_type: telegram_callback
        event_data: *telegram_disable_centinel_mode
    actions:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.centinel_mode
      - service: script.telegram_notify
        data:
          title: 'Centinel Mode'
          message: 'Centinel Mode has been disabled.'
      # Answer to the telegram callback if needed
      - condition: template
        value_template: "{{ trigger.event.event_type == 'telegram_callback' }}"
      - service: telegram_bot.answer_callback_query
        data:
          callback_query_id: "{{ trigger.event.data.id }}"
          message: "Done!"

  - alias: AUT-Centinel Mode Door Camera Recording
    id: AUT-Centinel_Mode_Door_Camera_Recording
    initial_state: 'on'
    triggers:
      - platform: state
        entity_id: binary_sensor.entrance_door_sensor_opened
        to: 'on'
    # conditions:
    #   - condition: state
    #     entity_id: input_boolean.centinel_mode
    #     state: 'on'
    variables:
      trigger_time: "{{ as_local(now()).strftime('%Y%m%d-%H%M%S') }}"
      trigger_time_unix: "{{ as_timestamp(now()) }}"
      # notification_target_person: auto

      ## All the start/ends times are relative to the trigger time
      record1_start: -5
      record1_end: 4
      record1_process_time: 3
      record1_filename: "/tmp/homeassistant/camera_recordings/entrance_{{ trigger_time }}_01.mp4"
      record2_start: 4
      record2_end: 10
      record2_process_time: 3
      record2_filename: "/tmp/homeassistant/camera_recordings/entrance_{{ trigger_time }}_02.mp4"
      record3_start: -5
      record3_end: 60
      record3_process_time: 7
      record3_filename: "/tmp/homeassistant/camera_recordings/entrance_{{ trigger_time }}_03.mp4"
    actions:
      - alias: "Define target person"
        variables:
          # Auto if centinel mode is on, otherwise manolo
          notification_target_person: "{{ 'manolo' if states('input_boolean.centinel_mode') == 'on' else 'auto' }}"

      # Immediate notification (does not block the camera)
      - service: script.telegram_notify
        data:
          title: 'Alert: Door Opened - Starting Video Recording'
          message: "The entrance door has been opened at `{{ trigger_time }}` and we are starting video recordings."
          target_person: '{{ notification_target_person }}'

      # Timeline:
      #   record_1
      #           ┌─ delay 3s → send_video_1
      #           └─ record_2
      #                       ┌─ delay 3s → send_video_2
      #                       └─ record_3 → delay 7s → send_video_3
      #                                                             

      # Recording 1: captures BEFORE the event via lookback
      - service: camera.record
        continue_on_error: true
        target:
          entity_id: camera.entrance_camera
        data:
          lookback: '{{ trigger_time_unix + record1_start - as_timestamp(now()) }}'
          duration: '{{ trigger_time_unix + record1_end - as_timestamp(now()) }}'
          filename: '{{ record1_filename }}'

      - parallel:
        - sequence:
          - delay:
              seconds: '{{ record1_process_time }}'  # file finalisation buffer for recording 1
          - service: script.telegram_notify
            continue_on_error: true
            data:
              content_type: 'send_video'
              video_file: '{{ record1_filename }}'
              media_caption: "Initial recording #{{ trigger_time }} ({{ record1_start }}s to {{ record1_end }}s)"
              target_person: '{{ notification_target_person }}'
        - sequence:
          # Recording 2 starts immediately — no reason to wait for Telegram
          - service: camera.record
            continue_on_error: true
            target:
              entity_id: camera.entrance_camera
            data:
              lookback: '{{ trigger_time_unix + record2_start - as_timestamp(now()) }}'
              duration: '{{ trigger_time_unix + record2_end - as_timestamp(now()) }}'
              filename: '{{ record2_filename }}'
          - parallel:
            - sequence:
              # Delay lives here so recording 3 is not held waiting for it
              - delay:
                  seconds: '{{ record2_process_time }}'  # file finalisation buffer for recording 2
              - service: script.telegram_notify
                continue_on_error: true
                data:
                  content_type: 'send_video'
                  video_file: '{{ record2_filename }}'
                  media_caption: "Continuation recording #{{ trigger_time }} ({{ record2_start }}s to {{ record2_end }}s)"
                  target_person: '{{ notification_target_person }}'
            - sequence:
              # Recording 3 starts immediately after recording 2
              - service: camera.record
                continue_on_error: true
                target:
                  entity_id: camera.entrance_camera
                data:
                  lookback: '{{ trigger_time_unix + record3_start - as_timestamp(now()) }}'
                  duration: '{{ trigger_time_unix + record3_end - as_timestamp(now()) }}'
                  filename: '{{ record3_filename }}'
              - delay:
                  seconds: '{{ record3_process_time }}'  # file finalisation buffer for recording 3
              - service: script.telegram_notify
                continue_on_error: true
                data:
                  content_type: 'send_video'
                  video_file: '{{ record3_filename }}'
                  media_caption: "Final recording #{{ trigger_time }} ({{ record3_start }}s to {{ record3_end }}s)"
                  target_person: '{{ notification_target_person }}'
              # Clean up old recordings
              - service: shell_command.delete_old_camera_recordings

  # Simulate presence with light patterns
  - alias: AUT-Centinel Mode Light Control - Sunset
    id: AUT-Centinel_Mode_Light_Control_Sunset
    initial_state: 'on'
    triggers:
      - platform: sun
        event: sunset
    conditions:
      - condition: state
        entity_id: input_boolean.centinel_mode
        state: 'on'
    actions:
      - delay:
          minutes: "{{ range(0, 30) | random }}"
      - service: light.turn_on
        target:
          entity_id: group.centinel_mode_lights
        data:
          brightness: "{{ range(180, 255) | random }}"

  - alias: AUT-Centinel Mode Light Control - Night Off
    id: AUT-Centinel_Mode_Light_Control_Night_Off
    initial_state: 'on'
    triggers:
      - platform: time
        at: '23:00:00'
    conditions:
      - condition: state
        entity_id: input_boolean.centinel_mode
        state: 'on'
    actions:
      - delay:
          minutes: "{{ range(0, 59) | random }}"
      - service: light.turn_off
        target:
          entity_id: group.centinel_mode_lights
