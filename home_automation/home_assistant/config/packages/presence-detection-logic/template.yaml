# template:
  # https://philhawthorne.com/making-home-assistants-presence-detection-not-so-binary/
  # WARNING: these are state-based sensors — they briefly show 'unknown' on HA restart
  # and 'unavailable' on YAML reload. Any automation triggering on these sensors MUST
  # use not_from: [unknown, unavailable] to avoid false triggers.
  - sensor:
    - name: Manolo
      unique_id: manolo_status
      default_entity_id: sensor.manolo_status
      state: '{{ states.input_select.manolo_status_dropdown.state }}'
    - name: Monica
      unique_id: monica_status
      default_entity_id: sensor.monica_status
      state: '{{ states.input_select.monica_status_dropdown.state }}'
    - name: Home Occupancy
      unique_id: home_occupancy_status
      default_entity_id: sensor.home_occupancy_status
      state: '{{ states.input_select.home_occupancy_status_dropdown.state }}'
