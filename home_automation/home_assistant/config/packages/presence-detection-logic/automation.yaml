# automation:
  # Inspired/Copy from https://philhawthorne.com/making-home-assistants-presence-detection-not-so-binary/
  - alias: PTR-Mark person as just arrived
    id: 'ptr_mark_person_as_just_arrived'
    mode: queued
    triggers:
      - platform: state
        from: 'not_home'
        to: 'home'
        entity_id: &persons
          - person.monica
          - person.manolo
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'person.manolo' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Just Arrived

  - alias: PTR-Mark person as home
    id: 'ptr_mark_person_as_home'
    mode: queued
    triggers:
      - platform: state
        entity_id: &input-select-people-status
          - input_select.manolo_status_dropdown
          - input_select.monica_status_dropdown
        to: 'Just Arrived'
        for:
          minutes: 10
      - platform: state
        entity_id: *input-select-people-status
        from: 'Just Left'
        to: 'Just Arrived'
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'input_select.manolo_status_dropdown' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Home

  - alias: PTR-Mark person as just left
    id: 'ptr_mark_person_as_just_left'
    mode: queued
    triggers:
      - platform: state
        entity_id: *persons
        from: 'home'
        to: 'not_home'
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'person.manolo' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Just Left

  - alias: PTR-Mark person as away
    id: 'ptr_mark_person_as_away'
    mode: queued
    triggers:
      - platform: state
        entity_id: *input-select-people-status
        to: 'Just Left'
        for:
          minutes: 10
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'input_select.manolo_status_dropdown' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Away

  - alias: PTR-Mark person as extended away
    id: 'ptr_mark_person_as_extended_away'
    mode: queued
    triggers:
      - platform: state
        entity_id: *input-select-people-status
        to: 'Away'
        for:
          hours: 24
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'input_select.manolo_status_dropdown' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Extended Away

  # Update home occupancy when some people state changed
  # Myself
  - alias: PTR-Update home occupancy
    id: 'ptr_update_home_occupancy'
    mode: queued
    triggers:
      - platform: state
        not_from:
          - 'unknown'
          - 'unavailable'
        to:
          - 'Home'
          - 'Just Arrived'
          - 'Just Left'
          - 'Away'
          - 'Extended Away'
        # Trigger on the sensors (not the input_selects) so the template sensors are
        # guaranteed to be up-to-date when the action reads them, eliminating a race
        # condition where the automation could fire before the sensors had re-evaluated.
        entity_id:
          - sensor.manolo_status
          - sensor.monica_status
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: input_select.home_occupancy_status_dropdown
          option: >
            {%- if states(trigger.entity_id) == states('input_select.home_occupancy_status_dropdown') -%}
              {{ states(trigger.entity_id) }}
            {%- else -%}
              {# Loop over all states and get the most restrictive #}
              {%- set status_json = {
                  "Home": 0,
                  "Just Arrived": 1,
                  "Just Left": 2,
                  "Away": 3,
                  "Extended Away": 4
              } -%}
              {%- set next_home_occupancy = namespace(value=status_json['Extended Away'],name='Extended Away') -%}
              {%- for tracker in expand('group.people_status') if tracker.state in status_json and status_json[tracker.state] < next_home_occupancy.value -%}
                  {%- set next_home_occupancy.value = status_json[tracker.state] -%}
                  {%- set next_home_occupancy.name = tracker.state -%}
              {%- endfor -%}
              {{next_home_occupancy.name}}
            {%- endif -%}

  # After a full HA restart, person entities go 'unknown' before the tracker confirms their
  # real state. The existing just_left/just_arrived automations use from:'home'/'not_home',
  # so they miss the 'unknown → <state>' recovery transition, leaving the input_selects
  # diverged from reality. This automation reconciles each person's dropdown as soon as the
  # tracker reports a definitive state.
  - alias: PTR-Restore person status after restart
    id: 'ptr_restore_person_status_after_restart'
    mode: queued
    triggers:
      - platform: state
        entity_id:
          - person.monica
          - person.manolo
        from: 'unknown'
        to:
          - 'home'
          - 'not_home'
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'person.manolo' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: >
            {% if trigger.entity_id == 'person.manolo' %}
              {% set sel = states('input_select.manolo_status_dropdown') %}
            {% else %}
              {% set sel = states('input_select.monica_status_dropdown') %}
            {% endif %}
            {% if trigger.to_state.state == 'home' and sel in ['Just Left', 'Away', 'Extended Away'] %}
              Home
            {% elif trigger.to_state.state == 'not_home' and sel in ['Home', 'Just Arrived'] %}
              Away
            {% else %}
              {{ sel }}
            {% endif %}

  # After a full HA restart, sensors briefly go unknown/unavailable before recovering.
  # PTR-Update home occupancy blocks those recovery transitions (not_from: unknown/unavailable),
  # so this automation corrects home_occupancy once both sensors are back to a known state.
  - alias: PTR-Recover home occupancy after restart
    id: 'ptr_recover_home_occupancy_after_restart'
    mode: queued
    triggers:
      - platform: state
        entity_id:
          - sensor.manolo_status
          - sensor.monica_status
        from:
          - 'unknown'
          - 'unavailable'
        to:
          - 'Home'
          - 'Just Arrived'
          - 'Just Left'
          - 'Away'
          - 'Extended Away'
    conditions:
      # Wait until both sensors have recovered before acting, so we don't set
      # home_occupancy based on only one person's state.
      - condition: template
        value_template: >
          {% set valid = ['Home', 'Just Arrived', 'Just Left', 'Away', 'Extended Away'] %}
          {{ states('sensor.manolo_status') in valid
             and states('sensor.monica_status') in valid }}
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: input_select.home_occupancy_status_dropdown
          option: >
            {%- set manolo = states('sensor.manolo_status') -%}
            {%- set monica = states('sensor.monica_status') -%}
            {%- if manolo in ['Home', 'Just Arrived'] or monica in ['Home', 'Just Arrived'] -%}
              Home
            {%- elif manolo in ['Just Left', 'Away'] or monica in ['Just Left', 'Away'] -%}
              Away
            {%- else -%}
              Extended Away
            {%- endif -%}
