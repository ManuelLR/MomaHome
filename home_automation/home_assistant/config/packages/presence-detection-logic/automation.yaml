# automation:
  # Inspired/Copy from https://philhawthorne.com/making-home-assistants-presence-detection-not-so-binary/
  - alias: PTR-Mark person as just arrived
    id: 'ptr_mark_person_as_just_arrived'
    mode: queued
    triggers:
      - platform: state
        from:
          - 'not_home'
          - 'unknown'
          - 'unavailable'
        to: 'home'
        entity_id: &persons
          - person.monica
          - person.manolo
    conditions:
      # When coming from unknown/unavailable (HA restart or tracker reconnection), only act
      # if input_select is genuinely out of sync. This avoids disrupting correct states
      # (e.g. someone who was already Home before restart stays Home, not reset to Just Arrived).
      # Normal transitions (from: not_home) are always allowed through.
      - condition: template
        value_template: >
          {% set dropdown = 'input_select.manolo_status_dropdown' if trigger.entity_id == 'person.manolo' else 'input_select.monica_status_dropdown' %}
          {% if trigger.from_state.state in ['unknown', 'unavailable'] %}
            {{ states(dropdown) not in ['Home', 'Just Arrived'] }}
          {% else %}
            true
          {% endif %}
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'person.manolo' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Just Arrived

  - alias: PTR-Mark person as home
    id: 'ptr_mark_person_as_home'
    mode: queued
    triggers:
      - platform: state
        entity_id: &input-select-people-status
          - input_select.manolo_status_dropdown
          - input_select.monica_status_dropdown
        to: 'Just Arrived'
        for:
          minutes: 10
      - platform: state
        entity_id: *input-select-people-status
        from: 'Just Left'
        to: 'Just Arrived'
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'input_select.manolo_status_dropdown' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Home

  - alias: PTR-Mark person as just left
    id: 'ptr_mark_person_as_just_left'
    mode: queued
    triggers:
      - platform: state
        entity_id: *persons
        from:
          - 'home'
          - 'unknown'
          - 'unavailable'
        to: 'not_home'
    conditions:
      # When coming from unknown/unavailable (HA restart or tracker reconnection), only act
      # if input_select is genuinely out of sync. This avoids resetting Extended Away or
      # other correct away-states back to Just Left unnecessarily.
      # Normal transitions (from: home) are always allowed through.
      - condition: template
        value_template: >
          {% set dropdown = 'input_select.manolo_status_dropdown' if trigger.entity_id == 'person.manolo' else 'input_select.monica_status_dropdown' %}
          {% if trigger.from_state.state in ['unknown', 'unavailable'] %}
            {{ states(dropdown) not in ['Away', 'Just Left', 'Extended Away'] }}
          {% else %}
            true
          {% endif %}
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'person.manolo' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Just Left

  - alias: PTR-Mark person as away
    id: 'ptr_mark_person_as_away'
    mode: queued
    triggers:
      - platform: state
        entity_id: *input-select-people-status
        to: 'Just Left'
        for:
          minutes: 10
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'input_select.manolo_status_dropdown' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Away

  - alias: PTR-Mark person as extended away
    id: 'ptr_mark_person_as_extended_away'
    mode: queued
    triggers:
      - platform: state
        entity_id: *input-select-people-status
        to: 'Away'
        for:
          hours: 24
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: >
            {% if trigger.entity_id == 'input_select.manolo_status_dropdown' %}
              input_select.manolo_status_dropdown
            {% else %}
              input_select.monica_status_dropdown
            {% endif %}
          option: Extended Away

  # Update home occupancy when some people state changed
  # Myself
  - alias: PTR-Update home occupancy
    id: 'ptr_update_home_occupancy'
    mode: queued
    triggers:
      - platform: state
        # Trigger on the sensors (not the input_selects) so the template sensors are
        # guaranteed to be up-to-date when the action reads them, eliminating a race
        # condition where the automation could fire before the sensors had re-evaluated.
        entity_id:
          - sensor.manolo_status
          - sensor.monica_status
    actions:
      - service: input_select.select_option
        data_template:
          entity_id: input_select.home_occupancy_status_dropdown
          option: >
            {%- if states(trigger.entity_id) == states('input_select.home_occupancy_status_dropdown') -%}
              {{ states(trigger.entity_id) }}
            {%- else -%}
              {# Loop over all states and get the most restrictive #}
              {%- set status_json = {
                  "Home": 0,
                  "Just Arrived": 1,
                  "Just Left": 2,
                  "Away": 3,
                  "Extended Away": 4
              } -%}
              {%- set next_home_occupancy = namespace(value=status_json['Extended Away'],name='Extended Away') -%}
              {%- for tracker in expand('group.people_status') if status_json[tracker.state] < next_home_occupancy.value -%}
                  {%- set next_home_occupancy.value = status_json[tracker.state] -%}
                  {%- set next_home_occupancy.name = tracker.state -%}
              {%- endfor -%}
              {{next_home_occupancy.name}}
            {%- endif -%}
