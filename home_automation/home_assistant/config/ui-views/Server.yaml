- type: entities
  title: 'Server stats (Netdata)'
  entities:
    - sensor.server_cpu_usage
    - sensor.server_ram_used
    - sensor.server_load_1min
    - sensor.server_disk_used
    - sensor.server_disk_available

- type: history-graph
  title: 'Server'
  hours_to_show: 5
  entities:
    - sensor.server_cpu_usage
    - sensor.server_ram_used
    - sensor.server_load_1min

- type: entities
  title: 'UPS Server'
  entities:
    - sensor.ups_battery
    - sensor.ups_load
    - binary_sensor.ups_online_status
    - sensor.ups_startup_time
    - sensor.ups_status
    - sensor.ups_status_flag
    - sensor.ups_time_left
    - sensor.ups_time_on_battery
    - sensor.ups_total_time_on_battery
    - sensor.ups_transfer_from_battery

